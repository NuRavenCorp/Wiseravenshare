services:
  - type: web
    name: wiseravenshare-api
    env: docker
    dockerfilePath: ./Wiseravenshare.Server/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:10000
      - key: CLIENT_ORIGIN
        value: https://wise-ravens.com
      - key: DATABASE_URL
        sync: false
      - key: Stripe__SecretKey
        sync: false
      - key: Stripe__WebhookSecret
        sync: false
      - key: Social__Facebook__PageId
        sync: false
      - key: Social__Facebook__PageAccessToken
        sync: false
      - key: Social__TikTok__Username
        sync: false
      - key: Social__TikTok__AccessToken
        sync: false

  - type: web
    name: wiseravenshare-app
    env: static
    rootDir: wiseravenshare.client
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: VITE_API_URL
        value: https://wise-ravens.com/api
      - key: VITE_RAVENSIGHT_API_URL
        value: https://wise-ravens.com/api/ravensight
