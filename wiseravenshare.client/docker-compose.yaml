# docker-compose.yml
version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:18-alpine
    container_name: wiseravenshare-db
    environment:
      POSTGRES_DB: wiseravenshare_db
      POSTGRES_USER: wiseravenshare_user
      POSTGRES_PASSWORD: 1@Chinchin234
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wiseravenshare_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: wiseravenshare-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis123}

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wiseravenshare_api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=wiseravenshare_db;Username=wiseravenshare_user;Password=1@Chinchin234
      - Redis__ConnectionString=redis:6379,password=${REDIS_PASSWORD:-redis123}
      - Jwt__Key=${JWT_SECRET_KEY}
      - Jwt__Issuer=wiseravenshare.com
      - Jwt__Audience=wiseravenshare.com
      - YouTube__ApiKey=${YOUTUBE_API_KEY}
      - OpenAI__ApiKey=${OPENAI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "5000:5000"
      - "5001:5001"
    restart: unless-stopped
    volumes:
      - ./backend/MediaStorage:/app/MediaStorage
      - ./backend/Logs:/app/Logs

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wiseravenshare_frontend
    environment:
      - VITE_API_URL=http://backend:5000
      - VITE_WS_URL=ws://backend:5001
    depends_on:
      - backend
    ports:
      - "3000:3000"
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: wiseravenshare-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - ./frontend/dist:/usr/share/nginx/html
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped

  # Prometheus for Metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: wiseravenshare-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  # Grafana for Visualization
  grafana:
    image: grafana/grafana:latest
    container_name: wiseravenshare-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  postgres_data:
  prometheus_data:
  grafana_data: