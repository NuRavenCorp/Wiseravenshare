<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="keywords" content="social media, fact checking, truth detection, AI, podcast, video sharing, content verification">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://wiseravenshare.com/">

    <meta property="og:description" content="Share content with confidence. Real-time fact checking and AI-powered truth verification.">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://wiseravenshare.com/">
    <meta property="twitter:title" content="Wiseravenshare - Truth-Powered Social Media">
    <meta property="twitter:description" content="Share content with confidence. Real-time fact checking and AI-powered truth verification.">
    <meta property="twitter:image" content="https://wiseravenshare.com/twitter-image.jpg">
    
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180x180.png">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/manifest.json">
    
    <!-- PWA Related -->
    <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#1a1f2b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WiseRaven">
    <meta name="format-detection" content="telephone=no">
    <meta name="msapplication-TileColor" content="#1a1f2b">
    <meta name="msapplication-tap-highlight" content="no">
    
    <!-- Preconnect to external resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    
    <!-- Font Awesome (with fallback) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100..900;1,100..900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
    
    <!-- Preload critical assets -->
    <link rel="preload" href="/logo.svg" as="image">
    
    <title>Wiseravenshare - Truth-Powered Social Media Platform</title>
    
    <style>
        /* Critical CSS for initial render */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background-color: #0f1419;
            color: #f8fafc;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Loading Animation */
        .loading-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #1a1f2b 0%, #0f1419 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease-out;
        }

        .loading-content {
            text-align: center;
            animation: fadeInUp 0.6s ease-out;
        }

        .raven-logo {
            font-size: 80px;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(102, 126, 234, 0.5));
        }

        .loading-text {
            margin-top: 20px;
            font-size: 18px;
            color: #718096;
            letter-spacing: 2px;
        }

        .loading-progress {
            width: 200px;
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin: 20px auto 0;
            overflow: hidden;
        }

        .loading-progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            animation: loading 2s ease-in-out infinite;
            border-radius: 3px;
        }

        .loading-tips {
            margin-top: 30px;
            font-size: 12px;
            color: #4a5568;
            max-width: 300px;
            margin-left: auto;
            margin-right: auto;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes loading {
            0% {
                width: 0%;
                margin-left: 0%;
            }
            50% {
                width: 100%;
                margin-left: 0%;
            }
            100% {
                width: 0%;
                margin-left: 100%;
            }
        }

        /* Skeleton screen styles */
        .skeleton {
            background: linear-gradient(90deg, #1e293b 25%, #2d3748 50%, #1e293b 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
            border-radius: 8px;
        }

        @keyframes skeleton-loading {
            0% {
                background-position: 200% 0;
            }
            100% {
                background-position: -200% 0;
            }
        }

        /* Prevent FOUC */
        .no-fouc {
            opacity: 0;
        }
        
        .fouc-ready {
            opacity: 1;
            transition: opacity 0.3s ease;
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-container">
        <div class="loading-content">
            <div class="raven-logo">
                🦅
            </div>
            <div class="loading-text">WISERAVENSHARE</div>
            <div class="loading-progress">
                <div class="loading-progress-bar"></div>
            </div>
            <div class="loading-tips">
                💡 Did you know? Our AI truth engine verifies claims in real-time
            </div>
        </div>
    </div>

    <!-- Skeleton Screen (shown while React loads) -->
    <div id="skeleton-screen" style="display: none;">
        <div style="max-width: 1200px; margin: 0 auto; padding: 20px;">
            <!-- Header Skeleton -->
            <div class="skeleton" style="height: 60px; margin-bottom: 20px;"></div>
            
            <!-- Main Content Skeleton -->
            <div style="display: flex; gap: 20px;">
                <!-- Sidebar Skeleton -->
                <div style="flex: 0 0 250px;">
                    <div class="skeleton" style="height: 200px; margin-bottom: 20px;"></div>
                    <div class="skeleton" style="height: 300px;"></div>
                </div>
                
                <!-- Main Feed Skeleton -->
                <div style="flex: 1;">
                    <div class="skeleton" style="height: 150px; margin-bottom: 20px;"></div>
                    <div class="skeleton" style="height: 200px; margin-bottom: 20px;"></div>
                    <div class="skeleton" style="height: 200px; margin-bottom: 20px;"></div>
                    <div class="skeleton" style="height: 200px;"></div>
                </div>
                
                <!-- Right Sidebar Skeleton -->
                <div style="flex: 0 0 300px;">
                    <div class="skeleton" style="height: 100px; margin-bottom: 20px;"></div>
                    <div class="skeleton" style="height: 250px; margin-bottom: 20px;"></div>
                    <div class="skeleton" style="height: 200px;"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- React Root Element -->
    <div id="root" class="no-fouc"></div>

    <!-- Error Boundary Fallback -->
    <div id="error-fallback" style="display: none; text-align: center; padding: 50px;">
        <div style="font-size: 48px; margin-bottom: 20px;">⚠️</div>
        <h2>Something went wrong</h2>
        <p>Please refresh the page or try again later.</p>
        <button onclick="location.reload()" style="margin-top: 20px; padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer;">
            Refresh Page
        </button>
    </div>

    <script>
        // Hide loading screen when page is ready
        window.addEventListener('load', function() {
            setTimeout(function() {
                const loadingScreen = document.getElementById('loading-screen');
                if (loadingScreen) {
                    loadingScreen.style.opacity = '0';
                    setTimeout(function() {
                        loadingScreen.style.display = 'none';
                    }, 500);
                }
            }, 1000);
        });

        // Check for service worker support
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/sw.js').then(function(registration) {
                    console.log('ServiceWorker registration successful with scope: ', registration.scope);
                }).catch(function(error) {
                    console.log('ServiceWorker registration failed: ', error);
                });
            });
        }

        // Request notification permission
        if ('Notification' in window && Notification.permission !== 'denied' && Notification.permission !== 'granted') {
            setTimeout(function() {
                Notification.requestPermission();
            }, 5000);
        }

        // Detect if the app is installed (PWA)
        window.addEventListener('beforeinstallprompt', function(e) {
            e.preventDefault();
            window.deferredPrompt = e;
            
            // You can show an install button in your React app
            window.dispatchEvent(new CustomEvent('pwa-install-ready'));
        });

        // Handle offline/online status
        window.addEventListener('online', function() {
            window.dispatchEvent(new CustomEvent('network-status', { detail: { online: true } }));
        });
        
        window.addEventListener('offline', function() {
            window.dispatchEvent(new CustomEvent('network-status', { detail: { online: false } }));
        });

        // Performance monitoring
        if ('PerformanceObserver' in window) {
            const perfObserver = new PerformanceObserver((list) => {
                for (const entry of list.getEntries()) {
                    if (entry.entryType === 'largest-contentful-paint') {
                        console.log('LCP:', entry.startTime, entry.element);
                    }
                    if (entry.entryType === 'first-input') {
                        console.log('FID:', entry.processingStart - entry.startTime);
                    }
                }
            });
            perfObserver.observe({ entryTypes: ['largest-contentful-paint', 'first-input'] });
        }

        // Remove FOUC when React is ready
        window.addEventListener('react-ready', function() {
            document.getElementById('root').classList.remove('no-fouc');
            document.getElementById('root').classList.add('fouc-ready');
            const skeleton = document.getElementById('skeleton-screen');
            if (skeleton) {
                skeleton.style.display = 'none';
            }
        });

        // Error handling
        window.addEventListener('error', function(event) {
            console.error('Global error:', event.error);
            const root = document.getElementById('root');
            const errorFallback = document.getElementById('error-fallback');
            if (root && errorFallback && root.innerHTML === '') {
                root.style.display = 'none';
                errorFallback.style.display = 'block';
            }
        });

        // Unhandled promise rejection
        window.addEventListener('unhandledrejection', function(event) {
            console.error('Unhandled rejection:', event.reason);
        });
    </script>

    <!-- Additional preload hints -->
    <link rel="preload" href="/static/js/main.chunk.js" as="script">
    <link rel="preload" href="/static/js/vendors.chunk.js" as="script">
    
    <!-- DNS prefetch for external resources -->
    <link rel="dns-prefetch" href="https://api.wiseravenshare.com">
    <link rel="dns-prefetch" href="https://www.googleapis.com">
    <link rel="dns-prefetch" href="https://www.youtube.com">
</body>
</html>
