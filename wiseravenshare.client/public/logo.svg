<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
    <defs>
        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="gradient2" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
        </linearGradient>
    </defs>
    
    <!-- Background Circle -->
    <circle cx="100" cy="100" r="95" fill="url(#gradient)" />
    
    <!-- Raven/Crow Silhouette -->
    <path d="M 100 30 
             C 80 30, 60 45, 55 70 
             C 50 85, 52 100, 60 110
             C 55 105, 45 108, 40 115
             C 35 122, 38 128, 45 128
             C 50 128, 55 125, 58 120
             C 65 130, 75 135, 85 138
             C 80 145, 75 155, 78 165
             C 80 170, 85 172, 90 168
             C 92 165, 92 158, 90 150
             C 100 152, 110 152, 120 150
             C 118 158, 118 165, 120 168
             C 125 172, 130 170, 132 165
             C 135 155, 130 145, 125 138
             C 135 135, 145 130, 152 120
             C 155 125, 160 128, 165 128
             C 172 128, 175 122, 170 115
             C 165 108, 155 105, 150 110
             C 158 100, 160 85, 155 70
             C 150 45, 130 30, 100 30 Z" 
          fill="white" opacity="0.95"/>
    
    <!-- Eye -->
    <circle cx="80" cy="80" r="6" fill="url(#gradient2)" />
    <circle cx="80" cy="80" r="3" fill="white" />
    
    <!-- Beak Detail -->
    <path d="M 55 85 L 45 90 L 55 95" fill="none" stroke="url(#gradient2)" stroke-width="2"/>
    
    <!-- Feather Details -->
    <path d="M 90 120 C 95 130, 100 140, 100 150" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>
    <path d="M 110 120 C 105 130, 100 140, 100 150" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>
    <path d="M 100 115 C 100 125, 100 135, 100 145" fill="none" stroke="white" stroke-width="1.5" opacity="0.3"/>
    
    <!-- Wing Detail -->
    <path d="M 70 95 C 85 100, 95 115, 90 130" fill="none" stroke="white" stroke-width="1" opacity="0.4"/>
    <path d="M 140 95 C 125 100, 115 115, 120 130" fill="none" stroke="white" stroke-width="1" opacity="0.4"/>
    
    <!-- Talons -->
    <path d="M 78 165 L 75 175 M 78 165 L 80 175 M 78 165 L 85 173" 
          fill="none" stroke="white" stroke-width="2" opacity="0.7"/>
    <path d="M 132 165 L 125 175 M 132 165 L 130 175 M 132 165 L 135 173" 
          fill="none" stroke="white" stroke-width="2" opacity="0.7"/>
</svg>