<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favicon Generator - Wiseravenshare</title>
    <style>
        body {
            background: linear-gradient(135deg, #1a1f2b, #0f1419);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            max-width: 800px;
        }
        canvas {
            margin: 10px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            cursor: pointer;
            margin: 10px;
            font-size: 16px;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .size-badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            margin-top: 5px;
        }
        .download-all {
            background: #4caf50;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦅 Wiseravenshare Favicon Generator</h1>
        <p>Generate all required favicon sizes for your PWA</p>
        
        <div id="icons"></div>
        
        <button onclick="downloadAll()" class="download-all">📦 Download All Icons</button>
        <button onclick="generateFaviconPackage()">📁 Generate Favicon Package</button>
        
        <div style="margin-top: 20px; font-size: 12px; opacity: 0.7;">
            Tip: Place generated icons in the /public/icons/ directory
        </div>
    </div>

    <script>
        const sizes = [16, 32, 48, 64, 72, 96, 128, 144, 152, 192, 256, 384, 512];
        const icons = [];

        function drawIcon(size, bgGradient = true) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            
            // Background
            if (bgGradient) {
                const gradient = ctx.createLinearGradient(0, 0, size, size);
                gradient.addColorStop(0, '#667eea');
                gradient.addColorStop(1, '#764ba2');
                ctx.fillStyle = gradient;
            } else {
                ctx.fillStyle = '#1a1f2b';
            }
            ctx.fillRect(0, 0, size, size);
            
            // Draw raven/crow icon
            ctx.fillStyle = 'white';
            const fontSize = size * 0.5;
            ctx.font = `${fontSize}px "Segoe UI", "Font Awesome 6 Free", "Font Awesome 6 Brands"`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // Use crow emoji with text shadow for depth
            ctx.shadowColor = 'rgba(0,0,0,0.3)';
            ctx.shadowBlur = size * 0.05;
            ctx.fillText('🦅', size/2, size/2);
            
            // Reset shadow
            ctx.shadowColor = 'transparent';
            
            // Add border for smaller icons
            if (size <= 64) {
                ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                ctx.lineWidth = Math.max(1, size * 0.02);
                ctx.strokeRect(size * 0.1, size * 0.1, size * 0.8, size * 0.8);
            }
            
            return canvas;
        }

        function generateAllIcons() {
            const container = document.getElementById('icons');
            container.innerHTML = '';
            icons.length = 0;
            
            sizes.forEach(size => {
                const canvas = drawIcon(size);
                icons.push(canvas);
                
                const wrapper = document.createElement('div');
                wrapper.style.display = 'inline-block';
                wrapper.style.margin = '10px';
                wrapper.style.textAlign = 'center';
                
                wrapper.appendChild(canvas);
                
                const sizeLabel = document.createElement('div');
                sizeLabel.className = 'size-badge';
                sizeLabel.textContent = `${size}x${size}`;
                wrapper.appendChild(sizeLabel);
                
                container.appendChild(wrapper);
            });
        }

        function downloadIcon(canvas, size) {
            const link = document.createElement('a');
            link.download = `icon-${size}x${size}.png`;
            link.href = canvas.toDataURL();
            link.click();
        }

        function downloadAll() {
            icons.forEach((canvas, idx) => {
                setTimeout(() => downloadIcon(canvas, sizes[idx]), idx * 300);
            });
        }

        function generateFaviconPackage() {
            // Generate all needed favicon files
            const faviconSizes = [16, 32, 48, 64];
            const appleSizes = [57, 60, 72, 76, 114, 120, 144, 152, 180];
            
            faviconSizes.forEach(size => {
                const canvas = drawIcon(size, false);
                downloadIcon(canvas, `favicon-${size}x${size}`);
            });
            
            appleSizes.forEach(size => {
                const canvas = drawIcon(size, true);
                downloadIcon(canvas, `apple-touch-icon-${size}x${size}`);
            });
            
            // Generate favicon.ico (using 32x32 as base)
            const canvas32 = drawIcon(32, false);
            downloadIcon(canvas32, 'favicon.ico');
            
            // Generate mstile
            const canvasTile = drawIcon(144, true);
            downloadIcon(canvasTile, 'mstile-144x144');
            
            setTimeout(() => {
                alert('Favicon package generated! Check your downloads folder.');
            }, 2000);
        }

        generateAllIcons();
    </script>
</body>
</html>
