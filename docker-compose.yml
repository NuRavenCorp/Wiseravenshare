services:
  db:
    image: postgres:16-alpine
    container_name: wiseravenshare-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: wiseravenshare_db
      POSTGRES_USER: wiseravenshare_user
      POSTGRES_PASSWORD: wiseravenshare_password
    volumes:
      - wiseravenshare-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wiseravenshare_user -d wiseravenshare_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: ./Wiseravenshare.Server/Dockerfile
    container_name: wiseravenshare-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://0.0.0.0:10000
      CLIENT_ORIGIN: http://localhost:5173
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=wiseravenshare_db;Username=wiseravenshare_user;Password=wiseravenshare_password;SSL Mode=Disable;Trust Server Certificate=true
    ports:
      - "10000:10000"

volumes:
  wiseravenshare-postgres-data:
