services:
  api:
    image: mcr.microsoft.com/dotnet/aspnet:10.0
    container_name: wiseravenshare-api
    working_dir: /app
    command: ["dotnet", "WiseRavenShare.Server.dll"]
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:10000
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=wiseravenshare_db;Username=wiseravenshare_user;Password=wiseravenshare_password
    ports:
      - "10000:10000"
    volumes:
      - ./publish/server:/app
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16
    container_name: wiseravenshare-db
    environment:
      POSTGRES_DB: wiseravenshare_db
      POSTGRES_USER: wiseravenshare_user
      POSTGRES_PASSWORD: wiseravenshare_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wiseravenshare_user -d wiseravenshare_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
